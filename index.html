<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIA-LANA — Photography · Art Direction</title>
  <meta name="description" content="Tia-Lana Chinapyel — photography & art direction. A digital editorial gallery. Paris, 2026." />
  <meta name="theme-color" content="#07080D" />
  <meta property="og:title" content="TIA-LANA — Photography · Art Direction" />
  <meta property="og:description" content="A digital editorial gallery." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main" data-i18n="skip">Skip to content</a>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-nav">
    <a class="brand" href="index.html">TIA-LANA<span class="red">.</span></a>
    <div class="nav-right">
      <button class="lang-toggle" data-lang-toggle aria-label="Switch language">FR</button>
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links" data-i18n="nav.menu">Menu</button>
    </div>
    <nav class="nav-links" id="nav-links" aria-label="Main navigation">
      <a href="work.html" data-i18n="nav.work">Gallery</a>
      <a href="about.html" data-i18n="nav.about">About</a>
      <a href="process.html" data-i18n="nav.process">Process</a>
      <a href="booking.html" data-i18n="nav.booking">Booking</a>
      <a href="contact.html" data-i18n="nav.contact">Contact</a>
    </nav>
  </header>

  <main id="main">
    <!-- ============ COVER — repeated wordmark over portrait ============ -->
    <section class="cover">
      <figure class="cover__hero">
        <img src="img/home/hero-home.png" alt="Editorial portrait of Tia-Lana Chinapyel." width="900" height="1200" />
      </figure>

      <h1 class="cover__words" aria-label="Tia-Lana Chinapyel">
        <span class="cover__word" aria-hidden="true">TIA-LANA</span>
        <span class="cover__word cover__word--out" aria-hidden="true">TIA-LANA</span>
        <span class="cover__word" aria-hidden="true">TIA-LANA</span>
      </h1>

      <div class="cover__foot">
        <p class="cover__name" data-i18n="cover.name">Tia-Lana Chinapyel — Photography &amp; Art Direction</p>
        <a class="cta" href="work.html" data-cursor="enter" data-i18n="cover.enter">Enter the gallery →</a>
        <span class="scroll-hint" aria-hidden="true" data-i18n="cover.scroll">Scroll ↓</span>
      </div>
    </section>

    <!-- ============ TV WALL ============ -->
    <section class="wrap" style="padding-block:clamp(2.5rem,6vh,4.5rem)" aria-labelledby="tv-title">
      <div class="section-head reveal" style="margin-bottom:1.25rem">
        <span class="eyebrow" data-i18n="home.eyebrow">Pick a channel → step inside</span>
        <h2 id="tv-title" data-i18n="home.title">Turn on a TV.</h2>
      </div>

      <!-- Populated by js/tv-grid.js -->
      <div data-tv-grid class="reveal" aria-label="Wall of TVs, one channel per category"></div>
    </section>
  </main>

  <footer class="site-footer wrap">
    <div class="grid12">
      <p class="footer-brand col-span-6" data-i18n="footer.brand">TIA-LANA — PARIS</p>
      <p class="meta col-span-6" style="text-align:right" data-i18n="footer.role">PHOTOGRAPHY · ART DIRECTION</p>
    </div>
  </footer>

  <!-- GSAP via CDN (only allowed dependency) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script type="module" src="js/i18n.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/cursor.js"></script>
  <script type="module" src="js/transitions.js"></script>
  <script type="module" src="js/tv-grid.js"></script>
</body>
</html>
