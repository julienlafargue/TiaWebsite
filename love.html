  <style>
    :root {
      --cream:      #F9F4EE;
      --blush:      #E8C8BE;
      --rose:       #C9736A;
      --warm-brown: #4A2E2C;
      --text-mid:   #6B4A45;
      --text-light: #A07870;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--warm-brown);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grain */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .4;
    }

    /* ── FLOATING PETALS ── */
    .petal {
      position: fixed; pointer-events: none; z-index: 1;
      font-size: 1rem; opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px) translateX(0)              rotate(0deg);   opacity: 0; }
      10%  { opacity: .45; }
      50%  { transform: translateY(50vh)  translateX(var(--sway, 0)) rotate(180deg); }
      90%  { opacity: .45; }
      100% { transform: translateY(110vh) translateX(0)              rotate(340deg); opacity: 0; }
    }

    /* ── MAIN LAYOUT ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 8%;
      position: relative;
      z-index: 2;
    }

    /* ornamental top line */
    .top-ornament {
      display: flex; align-items: center; gap: 18px;
      margin-bottom: 60px;
      opacity: 0; animation: fadeUp .9s ease .2s forwards;
    }
    .orn-line { flex: 1; max-width: 120px; height: 1px; background: var(--blush); }
    .orn-heart {
      font-size: 1.1rem; color: var(--rose);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.25); }
    }

    /* ── LETTER CARD ── */
    .letter {
      background: #FDF8F3;
      border: 1px solid rgba(232,200,190,.5);
      max-width: 680px; width: 100%;
      padding: 70px 64px;
      position: relative;
      box-shadow: 0 30px 80px rgba(74,46,44,.08), 0 2px 8px rgba(74,46,44,.04);
      opacity: 0; animation: fadeUp 1s ease .4s forwards;
    }

    /* corner flourishes */
    .letter::before, .letter::after {
      content: '✦';
      position: absolute;
      font-size: .7rem; color: var(--blush);
    }
    .letter::before { top: 18px; left: 22px; }
    .letter::after  { bottom: 18px; right: 22px; }

    .letter-label {
      font-size: .6rem; letter-spacing: 4px; text-transform: uppercase;
      color: var(--rose); margin-bottom: 28px; display: block;
    }

    .letter-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 300; font-style: italic;
      line-height: 1.05;
      color: var(--warm-brown);
      margin-bottom: 36px;
    }
    .letter-name em { color: var(--rose); font-style: italic; }

    .divider {
      width: 48px; height: 1px;
      background: var(--blush); margin-bottom: 36px;
    }

    .letter-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-weight: 300; font-style: italic;
      line-height: 1.95; color: var(--text-mid);
    }
    .letter-body p { margin-bottom: 22px; }
    .letter-body p:last-child { margin-bottom: 0; }
    .letter-body strong {
      font-style: normal; font-weight: 400; color: var(--warm-brown);
    }
    .letter-body .highlight {
      color: var(--rose);
    }

    /* signature */
    .signature {
      margin-top: 44px; padding-top: 32px;
      border-top: 1px solid rgba(232,200,190,.4);
      display: flex; align-items: center; gap: 14px;
    }
    .sig-heart { font-size: 1.4rem; color: var(--rose); animation: pulse 2.2s ease-in-out infinite; }
    .sig-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-style: italic; font-weight: 300;
      color: var(--warm-brown);
    }

    /* bottom */
    .bottom-ornament {
      margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; animation: fadeUp .9s ease .8s forwards;
    }
    .bottom-ornament span {
      font-size: .62rem; letter-spacing: 4px; text-transform: uppercase;
      color: var(--text-light);
    }
    .hearts-row { display: flex; gap: 10px; }
    .hearts-row span {
      font-size: .9rem; color: var(--blush);
      animation: pulse 2.2s ease-in-out infinite;
      letter-spacing: 0;
    }
    .hearts-row span:nth-child(2) { animation-delay: .3s; }
    .hearts-row span:nth-child(3) { animation-delay: .6s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 640px) {
      .letter { padding: 44px 28px; }
      .page { padding: 60px 5%; }
    }
  </style>
</head>
<body>

  <!-- entry overlay (matches the expanding rose circle from index.html) -->
  <div id="entry-overlay" style="position:fixed;inset:0;background:#C9736A;z-index:9000;pointer-events:none;transition:opacity .55s ease .1s"></div>
  <script>
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const o = document.getElementById('entry-overlay');
      o.style.opacity = '0';
      setTimeout(() => o.remove(), 700);

  <!-- falling hearts -->
  <script>

      const dur  = 7 + Math.random() * 11;
      const sway = (Math.random() - .5) * 60;
      p.style.cssText = `
        left: ${Math.random() * 105}vw;
        animation-duration: ${dur}s;
        animation-delay: ${Math.random() * 10}s;
        font-size: ${size}rem;
        color: ${colors[i % colors.length]};
        --sway: ${sway}px;
      `;
      document.body.appendChild(p);
    }
  </script>

  <script>

    const OPENINGS = [
      `There are people who light up everything they touch, who move through the world with such effortless grace that you wonder if they were simply made differently from the rest of us. <span class="highlight">You are one of them.</span>`,
      /*`Some people leave a mark on the world just by existing. They don't try, they simply are, and everything around them becomes warmer, brighter, more alive. <span class="highlight">That's you.</span>`,

      `I've thought a lot about what makes someone truly remarkable. It's not one thing, it's the way they listen, the way they laugh, the way they show up. <span class="highlight">You have all of it.</span>`,
      `There are people you admire from a distance, and people who change you from up close. <span class="highlight">You are both, somehow, at the same time.</span>`,
      `I don't believe in coincidences anymore. I believe in the specific, quiet kind of magic that brings exceptional people into your life. <span class="highlight">You were that magic.</span>`,

      `You have a way of making people feel seen. Truly seen. Not just noticed, <em>understood</em>. <span class="highlight">That is one of the rarest gifts a person can have.</span>`,
      `I've watched you create. I've watched you think. The care you pour into everything isn't effort, it's love. <span class="highlight">And it shows in everything you make.</span>`,
      `There is something in you that refuses to be ordinary. Not ambition, something deeper. A hunger for beauty and meaning that I find <span class="highlight">endlessly moving.</span>`,

      `You are brave in ways that matter. Not the loud, obvious kind of brave, the quiet, daily kind. The kind that asks you to show up as yourself, fully, even when it's hard. <span class="highlight">You do that. Every time.</span>`,
      `There is a warmth that follows you everywhere. Into conversations, into photographs, into every room you enter. <span class="highlight">It's entirely and unmistakably yours.</span>`,

    const MIDDLES = [
      `You are <strong>exceptional</strong>. Not the way people say it to be kind, the way you feel it in silence, with an admiration that's almost impossible to put into words. Your sensitivity, your intelligence, the way you show up fully in everything you do: it all adds up to something rare and precious.`,

    ];

    const LIGHTS = [
      `You carry a light inside you that maybe you don't always see yourself. But I see it. <span class="highlight">I see it all the time.</span>`,
      /*`And yet for all this brilliance, you remain the most genuinely, quietly humble person I know. That combination, of greatness and groundedness, is <span class="highlight">almost impossible to find.</span>`,

      `I think one of the most underrated things about you is how hard you work, quietly, consistently, without needing anyone to notice. <span class="highlight">I notice. I always notice.</span>`,

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
