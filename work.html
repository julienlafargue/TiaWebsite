<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — TIA-LANA</title>
  <meta name="description" content="All the work by Tia-Lana Chinapyel: photography, film posters, brand identities, editions, portraits, work in progress. Filter by type." />
  <meta name="theme-color" content="#07080D" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Dancing+Script:wght@600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="css/reset.css?v=11" />
  <link rel="stylesheet" href="css/tokens.css?v=11" />
  <link rel="stylesheet" href="css/typography.css?v=11" />
  <link rel="stylesheet" href="css/styles.css?v=11" />
</head>
<body class="page-gallery">
  <a class="skip-link" href="#main" data-i18n="skip">Skip to content</a>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-nav">
    <a class="brand" href="index.html">TIA-LANA<span class="brand__heart" aria-hidden="true">♥</span></a>
    <div class="nav-right">
      <button class="lang-toggle" data-lang-toggle aria-label="Switch language">FR</button>
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links" data-i18n="nav.menu">Menu</button>
    </div>
    <nav class="nav-links" id="nav-links" aria-label="Main navigation">
      <a href="work.html" aria-current="page" data-i18n="nav.work">Gallery</a>
      <a href="about.html" data-i18n="nav.about">About</a>
      <a href="process.html" data-i18n="nav.process">Process</a>
      <a href="booking.html" data-i18n="nav.booking">Booking</a>
    </nav>
  </header>

  <main id="main" class="wrap pad-block">
    <div class="section-head reveal">
      <div class="stack">
        <span class="eyebrow" data-i18n="work.eyebrow">Every frame, one place</span>
        <h1 class="display" data-i18n="work.title">Gallery</h1>
      </div>
    </div>

    <p class="lead reveal" style="max-width:52ch;margin-bottom:2.5rem" data-i18n="work.intro">
      All the work in one place. Filter by type of creation, click a frame to slide it into the camera.
    </p>

    <!-- Filtres -->
    <div class="filters reveal" role="group" aria-label="Filter by category" style="margin-bottom:2rem">
      <button class="filter-btn" data-filter="all" aria-pressed="true" data-i18n="filter.all">All</button>
      <button class="filter-btn" data-filter="photographie" aria-pressed="false" data-i18n="filter.photographie">Photography</button>
      <button class="filter-btn" data-filter="affiches" aria-pressed="false" data-i18n="filter.affiches">Film posters</button>
      <button class="filter-btn" data-filter="identites" aria-pressed="false" data-i18n="filter.identites">Brand identities</button>
      <button class="filter-btn" data-filter="editions" aria-pressed="false" data-i18n="filter.editions">Editions</button>
      <button class="filter-btn" data-filter="portraits" aria-pressed="false" data-i18n="filter.portraits">Portraits</button>
      <button class="filter-btn" data-filter="encours" aria-pressed="false" data-i18n="filter.encours">In progress</button>
    </div>

    <!-- Galerie en bandes 35mm (peuplée par js/gallery.js) -->
    <div class="reveal" data-gallery aria-live="polite" aria-label="All photos"></div>
  </main>

  <footer class="site-footer wrap">
    <div class="grid12">
      <p class="footer-brand col-span-6" data-i18n="footer.brand">TIA-LANA — PARIS</p>
      <p class="meta col-span-6" style="text-align:right" data-i18n="footer.role">PHOTOGRAPHY · ART DIRECTION</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script type="module" src="js/i18n.js?v=7"></script>
  <script type="module" src="js/main.js?v=7"></script>
  <script type="module" src="js/cursor.js?v=7"></script>
  <script type="module" src="js/transitions.js?v=7"></script>
  <script type="module" src="js/gallery.js?v=7"></script>
</body>
</html>
